name: "Project Tests"
description: "Runs project integration (doc) tests and E2E (link checker) tests"
inputs:
  python-version:
    description: "Python version to set up"
    required: false
    default: "3.10"
  run-functional:
    description: "Whether to run functional (integration doc) tests"
    required: false
    default: "true"
  run-e2e:
    description: "Whether to run end-to-end (e2e link check) tests"
    required: false
    default: "true"
  test-category:
    description: "Test category: smoke, sanity, regression, or all (supports combinations\
      \ like 'smoke or sanity')"
    required: false
    default: "all"
  generate-coverage:
    description: "Generate test coverage report (not applicable for project env)"
    required: false
    default: "false"
  extra-args:
    description: "Extra arguments to pass to the tests"
    required: false
    default: ""
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
outputs:
  coverage-generated:
    description: "Whether a coverage report was generated"
    value: "false"
  coverage-reports:
    description: "Paths to the generated coverage report(s)"
    value: ""
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      run: |
        if [[ "${{ inputs.force-run }}" == "true" || \
              "${{ steps.filter.outputs.github_changes }}" == "true" || \
              "${{ steps.filter.outputs.pyproject_changes }}" == "true" || \
              "${{ steps.filter.outputs.project_changes }}" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Run Project Functional Tests
      if: steps.check.outputs.run == 'true' && inputs.run-functional == 'true'
      shell: bash
      run: |-
        CATEGORY="${{ inputs.test-category }}"
        EXTRA="${{ inputs.extra-args }}"
        ARGS="$EXTRA"
        if [ "$CATEGORY" != "all" ] && [ -n "$CATEGORY" ]; then
          ARGS="-m \"$CATEGORY\" $EXTRA"
        fi
        echo "[INFO] Running Project integration tests (doc tests)..."
        hatch run -e project python scripts/generate_doc_tests.py
        hatch run -e python pytest .tests/docs $ARGS
    - name: Run Project E2E Tests
      if: steps.check.outputs.run == 'true' && inputs.run-e2e == 'true'
      shell: bash
      run: |-
        EXTRA="${{ inputs.extra-args }}"
        echo "[INFO] Running Project E2E tests (link checking)..."
        hatch run project:tests-e2e $EXTRA
