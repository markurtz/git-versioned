name: "Project Docs Builder"
description: "Builds project documentation using Zensical and optionally deploys to GitHub\
  \ Pages"
inputs:
  build-type:
    description: "Deploy target type: dev-branch, dev, nightly, release, or post"
    required: true
  alias:
    description: "The alias to use for the documentation version (e.g., latest, nightly)"
    required: true
  include-coverage:
    description: "Whether to download and include unit test coverage in the docs"
    required: false
    default: "false"
  deploy:
    description: "Whether to commit and deploy the built docs to the gh-pages branch"
    required: false
    default: "false"
  python-version:
    description: "Python version to set up"
    required: false
    default: "3.10"
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
outputs:
  deployed-url:
    description: "Path where the docs were deployed"
    value: ${{ steps.dest.outputs.path }}
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      env:
        FORCE_RUN: ${{ inputs.force-run }}
        GITHUB_CHANGES: ${{ steps.filter.outputs.github_changes }}
        DOCS_CHANGES: ${{ steps.filter.outputs.docs_changes }}
        SRC_CHANGES: ${{ steps.filter.outputs.src_changes }}
        PYPROJECT_CHANGES: ${{ steps.filter.outputs.pyproject_changes }}
      run: |
        if [[ "$FORCE_RUN" == "true" || \
              "$GITHUB_CHANGES" == "true" || \
              "$DOCS_CHANGES" == "true" || \
              "$SRC_CHANGES" == "true" || \
              "$PYPROJECT_CHANGES" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Configure Git Credentials
      if: steps.check.outputs.run == 'true' && inputs.deploy == 'true'
      shell: bash
      run: |
        git config user.name github-actions[bot]
        git config user.email github-actions[bot]@users.noreply.github.com
    - name: Download Python test coverage
      if: steps.check.outputs.run == 'true' && inputs.include-coverage == 'true'
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec801d16  # v4.1.8
      with:
        pattern: coverage-report-*-python-py${{ inputs.python-version }}-*
        path: coverage/python
        merge-multiple: true
      continue-on-error: true
    - name: Compute deployment destination path
      if: steps.check.outputs.run == 'true'
      id: dest
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REF_NAME: ${{ github.ref_name }}
        ALIAS: ${{ inputs.alias }}
      run: |
        case "$BUILD_TYPE" in
          dev-branch) echo "path=pr-$PR_NUMBER" >> "$GITHUB_OUTPUT" ;;
          dev)        echo "path=dev"           >> "$GITHUB_OUTPUT" ;;
          nightly)    echo "path=nightly"       >> "$GITHUB_OUTPUT" ;;
          release)    echo "path=$REF_NAME"     >> "$GITHUB_OUTPUT" ;;
          post)       echo "path=post"          >> "$GITHUB_OUTPUT" ;;
          *)          echo "path=$ALIAS"        >> "$GITHUB_OUTPUT" ;;
        esac
    - name: Build and deploy using Git
      if: steps.check.outputs.run == 'true'
      shell: bash
      env:
        VERSION_PATH: ${{ steps.dest.outputs.path }}
        ALIAS: ${{ inputs.alias }}
        BUILD_TYPE: ${{ inputs.build-type }}
        DEPLOY: ${{ inputs.deploy }}
      run: |-
        # Build documentation
        hatch run project:docs
        if [ "$DEPLOY" = "true" ]; then
          # Save built site files outside repo
          mv site ../site-temp

          # Checkout gh-pages branch
          git fetch origin gh-pages:gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Clean target directory and copy new files
          rm -rf "$VERSION_PATH"
          mkdir -p "$VERSION_PATH"
          cp -r ../site-temp/* "$VERSION_PATH"/

          # Deploy to alias path if alias is configured
          if [ "$ALIAS" != "" ] && [ "$ALIAS" != "$VERSION_PATH" ]; then
            rm -rf "$ALIAS"
            mkdir -p "$ALIAS"
            cp -r ../site-temp/* "$ALIAS"/
          fi

          # Set default redirect if release build
          if [ "$BUILD_TYPE" == "release" ]; then
            printf '%s\n' \
              '<!DOCTYPE html>' \
              '<html>' \
              '<head>' \
              "  <meta http-equiv=\"refresh\" content=\"0; url=${ALIAS}/\" />" \
              '  <script>' \
              "    window.location.replace(\"${ALIAS}/\" + window.location.search + window.location.hash);" \
              '  </script>' \
              '</head>' \
              '<body>' \
              "  <p>Redirecting to <a href=\"${ALIAS}/\">latest documentation</a>...</p>" \
              '</body>' \
              '</html>' > index.html
          fi

          # Commit changes and push
          git add -A
          git commit -m "docs: deploy documentation for $VERSION_PATH" || echo "No changes to commit"
          git push origin gh-pages
        fi
