name: "OCI Publisher"
description: "Tags and pushes container image to GHCR, optionally loading it from a tar archive"
inputs:
  image-tar:
    description: "The path to the built image tarball to load"
    required: true
  image-tag:
    description: "The primary tag to use for pushing"
    required: true
  alias-tag:
    description: "An optional alias tag to use for pushing"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Load, Tag, and Push Image
      shell: bash
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        IMAGE_TAR: ${{ inputs.image-tar }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        ALIAS_TAG: ${{ inputs.alias-tag }}
      run: |-
        # Registry namespaces must be strictly lowercase
        REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
        if [[ "$IMAGE_TAG" == nightly-* ]] && docker manifest inspect ghcr.io/"$REPO_LOWER":"$IMAGE_TAG" >/dev/null 2>&1; then
          echo "[INFO] Nightly image tag $IMAGE_TAG already exists in GHCR. Skipping push."
        else
          echo "[INFO] Loading OCI image from $IMAGE_TAR..."
          docker load -i "$IMAGE_TAR"
          echo "[INFO] Tagging and pushing primary tag $IMAGE_TAG..."
          docker tag gitversioned:latest ghcr.io/"$REPO_LOWER":"$IMAGE_TAG"
          docker push ghcr.io/"$REPO_LOWER":"$IMAGE_TAG"
          if [ -n "$ALIAS_TAG" ]; then
            echo "[INFO] Tagging and pushing alias tag $ALIAS_TAG..."
            docker tag gitversioned:latest ghcr.io/"$REPO_LOWER":"$ALIAS_TAG"
            docker push ghcr.io/"$REPO_LOWER":"$ALIAS_TAG"
          fi
        fi
