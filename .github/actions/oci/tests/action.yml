name: "OCI Tests"
description: "Runs OCI container structure tests (E2E) and no-op functional tests"
inputs:
  python-version:
    description: "Python version to set up"
    required: false
    default: "3.10"
  run-functional:
    description: "Whether to run functional (unit & integration) tests"
    required: false
    default: "true"
  run-e2e:
    description: "Whether to run end-to-end (e2e structure) tests"
    required: false
    default: "true"
  test-category:
    description: "Test category (not applicable for OCI tests)"
    required: false
    default: "all"
  generate-coverage:
    description: "Generate test coverage report (not applicable for OCI tests)"
    required: false
    default: "false"
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
outputs:
  coverage-generated:
    description: "Whether a coverage report was generated"
    value: "false"
  coverage-reports:
    description: "Paths to the generated coverage report(s)"
    value: ""
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      run: |
        if [[ "${{ inputs.force-run }}" == "true" || \
              "${{ steps.filter.outputs.github_changes }}" == "true" || \
              "${{ steps.filter.outputs.oci_changes }}" == "true" || \
              "${{ steps.filter.outputs.src_changes }}" == "true" || \
              "${{ steps.filter.outputs.pyproject_changes }}" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install container-structure-test
      if: steps.check.outputs.run == 'true' && inputs.run-e2e == 'true'
      shell: bash
      run: |-
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
        if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then ARCH="arm64"; fi
        curl -LO "https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-${OS}-${ARCH}"
        chmod +x "container-structure-test-${OS}-${ARCH}"
        sudo mv "container-structure-test-${OS}-${ARCH}" /usr/local/bin/container-structure-test
    - name: Run OCI Functional Tests
      if: steps.check.outputs.run == 'true' && inputs.run-functional == 'true'
      shell: bash
      run: |-
        echo "[INFO] Running OCI functional tests (unit/integration)..."
        hatch run oci:tests-unit
        hatch run oci:tests-int
    - name: Run OCI E2E Tests
      if: steps.check.outputs.run == 'true' && inputs.run-e2e == 'true'
      shell: bash
      run: |-
        # Optimize: check if image is already built/loaded by build job
        if docker image inspect gitversioned:latest >/dev/null 2>&1; then
          echo "[INFO] OCI image gitversioned:latest is already loaded. Running structure tests directly..."
          hatch run -e oci python scripts/run_oci.py cstest
        else
          echo "[INFO] OCI image gitversioned:latest not found. Building and running E2E tests..."
          hatch run oci:tests-e2e
        fi
