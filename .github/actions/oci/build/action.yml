name: "OCI Builder"
description: "Builds container image and saves it as a tarball"
inputs:
  python-version:
    description: "Python version to set up for tooling"
    required: false
    default: "3.10"
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
  build-version:
    description: "The version string to build"
    required: true
outputs:
  image-path:
    description: "The path to the saved OCI image tarball"
    value: "gitversioned-latest.tar"
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      env:
        FORCE_RUN: ${{ inputs.force-run }}
        GITHUB_CHANGES: ${{ steps.filter.outputs.github_changes }}
        OCI_CHANGES: ${{ steps.filter.outputs.oci_changes }}
        SRC_CHANGES: ${{ steps.filter.outputs.src_changes }}
        PYPROJECT_CHANGES: ${{ steps.filter.outputs.pyproject_changes }}
      run: |
        if [[ "$FORCE_RUN" == "true" || \
              "$GITHUB_CHANGES" == "true" || \
              "$OCI_CHANGES" == "true" || \
              "$SRC_CHANGES" == "true" || \
              "$PYPROJECT_CHANGES" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Build OCI Image
      if: steps.check.outputs.run == 'true'
      shell: bash
      env:
        BUILD_VERSION: ${{ inputs.build-version }}
        GIT_SHA: ${{ github.sha }}
      run: |
        hatch run oci:build --build-arg VERSION="$BUILD_VERSION" --build-arg GIT_SHA="$GIT_SHA" --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
    - name: Save OCI Image to Tarball
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: |-
        echo "[INFO] Serializing OCI image to tarball..."
        docker save gitversioned:latest -o gitversioned-latest.tar
