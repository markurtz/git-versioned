name: "Setup OCI Environment"
description: "Utility action to install OCI quality and security tools (hadolint, dclint,\
  \ dockle, trivy)"
runs:
  using: "composite"
  steps:
    - name: Install Hadolint, Dockle, and Trivy
      uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4  # v2.79.7
      with:
        tool: hadolint,dockle,trivy
    - name: Install DCLint
      shell: bash
      run: npm install -g dclint@3.1.0
