name: "Resolve and Set Version"
description: "Resolves the version dynamically and updates __init__.py and Dockerfile"
inputs:
  build-type:
    description: "Build type: dev, main, nightly, or release"
    required: false
    default: "dev"
outputs:
  version:
    description: "The resolved version string"
    value: ${{ steps.version-resolver.outputs.version }}
runs:
  using: "composite"
  steps:
    - name: Set up Python & Hatch
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: "3.10"
    - name: Resolve and set version
      id: version-resolver
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |-
        if [ ! -f "src/gitversioned/__init__.py" ]; then
          echo "[ERROR] src/gitversioned/__init__.py does not exist!"
          exit 1
        fi
        VERSION=$(cat << 'EOF' | sed 's/^[[:space:]]\{8\}//' | PYTHONPATH=src python -
        import os, re
        from pathlib import Path
        from gitversioned.settings import Settings
        from gitversioned.utils import BuildEnvironment, GitRepository
        from gitversioned.versioning import resolve_version
        build_type = os.getenv("BUILD_TYPE", "dev")
        config = {
            "release": {"version_type": "release"},
            "nightly": {
                "version_type": "nightly",
                "auto_increment": {"nightly": "minor"},
                "format_pre": "a{ref.timestamp:%Y%m%d}",
            },
        }.get(build_type, {
            "version_type": "dev",
            "auto_increment": {"dev": "micro"},
            "format_dev": "dev{ref.total_commits}+{ref.short_sha}",
        })
        if build_type == "release" and os.getenv("GITHUB_REF_NAME", "").startswith("v"):
            config["version"] = os.getenv("GITHUB_REF_NAME", "").lstrip("v")
        settings = Settings(**config)
        repo = GitRepository(settings.project_root)
        env = BuildEnvironment(project_root=settings.project_root)
        version, _, _ = resolve_version(settings, repo, env)
        resolved_version = str(version)

        # Update __init__.py
        init_file = Path("src/gitversioned/__init__.py")
        content = init_file.read_text(encoding="utf-8")
        new_content = re.sub(r"(?m)^__version__[^=]*=.*", f"__version__ = \"{resolved_version}\"", content)
        init_file.write_text(new_content, encoding="utf-8")
        print(resolved_version)
        EOF
        )
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "[INFO] Resolved version: $VERSION"
