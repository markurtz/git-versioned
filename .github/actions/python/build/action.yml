name: "Python Build"
description: "Builds the python wheel and sdist package using Hatch"
inputs:
  python-version:
    description: "Python version to build package against"
    required: false
    default: "3.10"
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
  build-type:
    description: "Build type: dev, nightly, or release"
    required: false
    default: "dev"
outputs:
  location:
    description: "Directory where artifacts are built"
    value: "dist/"
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      env:
        FORCE_RUN: ${{ inputs.force-run }}
        GITHUB_CHANGES: ${{ steps.filter.outputs.github_changes }}
        SRC_CHANGES: ${{ steps.filter.outputs.src_changes }}
        PYPROJECT_CHANGES: ${{ steps.filter.outputs.pyproject_changes }}
      run: |
        if [[ "$FORCE_RUN" == "true" || \
              "$GITHUB_CHANGES" == "true" || \
              "$SRC_CHANGES" == "true" || \
              "$PYPROJECT_CHANGES" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Resolve and set version
      id: version-resolver
      if: steps.check.outputs.run == 'true'
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
      run: |-
        hatch run gitversioned write --version-type "$BUILD_TYPE"
        VERSION=$(hatch run gitversioned calculate --version-type "$BUILD_TYPE")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Build Package
      if: steps.check.outputs.run == 'true'
      shell: bash
      run: |-
        hatch build
    - name: Validate Built Version
      if: steps.check.outputs.run == 'true'
      shell: bash
      env:
        BUILD_VERSION: ${{ steps.version-resolver.outputs.version }}
      run: |-
        built_version=$(hatch project metadata 2>/dev/null | python3 -c "import json, sys; print(json.load(sys.stdin)['version'])")
        echo "[INFO] Expected version: $BUILD_VERSION"
        echo "[INFO] Hatch metadata version: $built_version"
        if [ "$built_version" != "$BUILD_VERSION" ]; then
          echo "[ERROR] Hatch metadata version ($built_version) does not match expected build-version ($BUILD_VERSION)"
          exit 1
        fi
        if [ ! -f "dist/gitversioned-${BUILD_VERSION}-py3-none-any.whl" ] && [ ! -f "dist/gitversioned-${BUILD_VERSION}.tar.gz" ]; then
          echo "[ERROR] Expected build artifacts for version $BUILD_VERSION were not found in dist/"
          exit 1
        fi
        echo "[INFO] Build validation successful. Found matching artifacts."
