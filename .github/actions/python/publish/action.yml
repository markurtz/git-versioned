name: "Python Publish"
description: "Downloads python package build, attests build provenance, publishes to PyPI,\
  \ and optionally creates GitHub Release"
inputs:
  create-release:
    description: "Whether to create a GitHub Release (requires tags)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Generate artifact attestations
      uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
      with:
        subject-path: dist/*
    - name: Publish to PyPI
      uses: docker://ghcr.io/pypa/gh-action-pypi-publish:v1.14.0
      with:
        packages-dir: dist/
    - name: Create GitHub Release
      if: inputs.create-release == 'true'
      uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.0.8
      with:
        files: dist/*
        generate_release_notes: true
        prerelease: auto
      env:
        GITHUB_TOKEN: ${{ github.token }}
