name: "Python Tests"
description: "Runs python unit, integration, and e2e tests as separate steps with output coverage\
  \ reporting"
inputs:
  python-version:
    description: "Python version to run checks against"
    required: false
    default: "3.10"
  run-functional:
    description: "Whether to run functional (unit & integration) tests"
    required: false
    default: "true"
  run-e2e:
    description: "Whether to run end-to-end (e2e) tests"
    required: false
    default: "true"
  test-category:
    description: "Test category: smoke, sanity, regression, or all (supports combinations\
      \ like 'smoke or sanity')"
    required: false
    default: "all"
  generate-coverage:
    description: "Generate test coverage report"
    required: false
    default: "false"
  extra-args:
    description: "Extra arguments to pass to pytest"
    required: false
    default: ""
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
outputs:
  coverage-generated:
    description: "Whether a coverage report was generated"
    value: ${{ steps.coverage-outputs.outputs.coverage-generated }}
  coverage-reports:
    description: "Paths to the generated coverage report(s)"
    value: ${{ steps.coverage-outputs.outputs.coverage-reports }}
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      run: |
        if [[ "${{ inputs.force-run }}" == "true" || \
              "${{ steps.filter.outputs.github_changes }}" == "true" || \
              "${{ steps.filter.outputs.src_changes }}" == "true" || \
              "${{ steps.filter.outputs.tests_changes }}" == "true" || \
              "${{ steps.filter.outputs.pyproject_changes }}" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Run Python Functional Tests
      if: steps.check.outputs.run == 'true' && inputs.run-functional == 'true'
      shell: bash
      run: |-
        CATEGORY="${{ inputs.test-category }}"
        COV="${{ inputs.generate-coverage }}"
        EXTRA="${{ inputs.extra-args }}"
        ARGS="$EXTRA"
        if [ "$CATEGORY" != "all" ] && [ -n "$CATEGORY" ]; then
          ARGS="-m \"$CATEGORY\" $EXTRA"
        fi
        echo "[INFO] Running Python functional tests..."
        if [ "$COV" = "true" ]; then
          hatch run python:tests-func-cov $ARGS
        else
          hatch run python:tests-func $ARGS
        fi
    - name: Run Python E2E Tests
      if: steps.check.outputs.run == 'true' && inputs.run-e2e == 'true'
      shell: bash
      run: |-
        CATEGORY="${{ inputs.test-category }}"
        COV="${{ inputs.generate-coverage }}"
        EXTRA="${{ inputs.extra-args }}"
        ARGS="$EXTRA"
        if [ "$CATEGORY" != "all" ] && [ -n "$CATEGORY" ]; then
          ARGS="-m \"$CATEGORY\" $EXTRA"
        fi

        # Check if a pre-built wheel is present in dist/
        if [ -d "dist" ] && [ "$(find dist -name '*.whl' | wc -l)" -gt 0 ]; then
          echo "[INFO] Found pre-built wheel in dist/. Installing and running E2E tests..."
          hatch run -e python pip install --force-reinstall --no-deps --no-index --find-links=dist gitversioned
          if [ "$COV" = "true" ]; then
            hatch run -e python pytest --cov=gitversioned --cov-report=term --cov-report=markdown:coverage/python/coverage_tests-e2e.md tests/e2e $ARGS
          else
            hatch run -e python pytest tests/e2e $ARGS
          fi
        else
          echo "[INFO] No pre-built wheel found in dist/. Building and running E2E tests locally..."
          if [ "$COV" = "true" ]; then
            hatch run python:tests-e2e-cov $ARGS
          else
            hatch run python:tests-e2e $ARGS
          fi
        fi
    - name: Determine Coverage Outputs
      id: coverage-outputs
      shell: bash
      run: |-
        COV="${{ inputs.generate-coverage }}"
        RUN_FUNC="${{ inputs.run-functional }}"
        RUN_E2E="${{ inputs.run-e2e }}"
        WAS_RUN="${{ steps.check.outputs.run }}"
        if [ "$WAS_RUN" = "true" ] && [ "$COV" = "true" ]; then
          echo "coverage-generated=true" >> "$GITHUB_OUTPUT"
          REPORTS=""
          if [ "$RUN_FUNC" = "true" ]; then
            REPORTS="coverage/python/coverage_tests-func.md
        coverage/python/coverage_tests-unit.md
        coverage/python/coverage_tests-int.md"
          fi
          if [ "$RUN_E2E" = "true" ]; then
            if [ -n "$REPORTS" ]; then
              REPORTS="$REPORTS
        coverage/python/coverage_tests-e2e.md"
            else
              REPORTS="coverage/python/coverage_tests-e2e.md"
            fi
          fi
          {
            echo "coverage-reports<<EOF"
            echo "$REPORTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        else
          echo "coverage-generated=false" >> "$GITHUB_OUTPUT"
          echo "coverage-reports=" >> "$GITHUB_OUTPUT"
        fi
