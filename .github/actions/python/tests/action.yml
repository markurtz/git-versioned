name: "Python Tests"
description: "Runs python unit, integration, and e2e tests as separate steps with output coverage\
  \ reporting"
inputs:
  python-version:
    description: "Python version to run checks against"
    required: false
    default: "3.10"
  test-type:
    description: "Type of tests to run: functional or e2e"
    required: false
    default: "functional"
  test-category:
    description: "Test category: smoke, sanity, regression, or all (supports combinations\
      \ like 'smoke or sanity')"
    required: false
    default: "all"
  force-run:
    description: "Always run even if no changes are detected"
    required: false
    default: "false"
outputs:
  coverage-reports:
    description: "Paths to the generated coverage report(s)"
    value: ${{ steps.func-tests.outputs.coverage-reports || steps.e2e-tests.outputs.coverage-reports || '' }}
runs:
  using: "composite"
  steps:
    - name: Detect changes
      if: inputs.force-run != 'true'
      uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
      id: filter
      with:
        filters: .github/paths-filter.yml
    - name: Evaluate changes
      id: check
      shell: bash
      env:
        FORCE_RUN: ${{ inputs.force-run }}
        GITHUB_CHANGES: ${{ steps.filter.outputs.github_changes }}
        SRC_CHANGES: ${{ steps.filter.outputs.src_changes }}
        TESTS_CHANGES: ${{ steps.filter.outputs.tests_changes }}
        PYPROJECT_CHANGES: ${{ steps.filter.outputs.pyproject_changes }}
      run: |
        if [[ "$FORCE_RUN" == "true" || \
              "$GITHUB_CHANGES" == "true" || \
              "$SRC_CHANGES" == "true" || \
              "$TESTS_CHANGES" == "true" || \
              "$PYPROJECT_CHANGES" == "true" ]]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Evaluate test arguments
      id: args
      if: steps.check.outputs.run == 'true'
      shell: bash
      env:
        TEST_CATEGORY: ${{ inputs.test-category }}
      run: |-
        if [ "$TEST_CATEGORY" != "all" ] && [ -n "$TEST_CATEGORY" ]; then
          echo "args=-m \"$TEST_CATEGORY\"" >> "$GITHUB_OUTPUT"
        else
          echo "args=" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Python & Hatch
      if: steps.check.outputs.run == 'true'
      uses: ./.github/actions/utility/setup-python
      with:
        python-version: ${{ inputs.python-version }}
    - name: Run Python Functional Tests
      id: func-tests
      if: steps.check.outputs.run == 'true' && inputs.test-type == 'functional'
      shell: bash
      run: |-
        hatch run python:tests-func-cov ${{ steps.args.outputs.args }}
        {
          echo "coverage-reports<<EOF"
          echo "coverage/python/coverage_tests-func.md"
          echo "coverage/python/coverage_tests-unit.md"
          echo "coverage/python/coverage_tests-int.md"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
    - name: Run Python E2E Tests
      id: e2e-tests
      if: steps.check.outputs.run == 'true' && inputs.test-type == 'e2e'
      shell: bash
      run: |-
        hatch run python:tests-e2e-cov ${{ steps.args.outputs.args }}
        echo "coverage-reports=coverage/python/coverage_tests-e2e.md" >> "$GITHUB_OUTPUT"
