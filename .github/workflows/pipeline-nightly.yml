# ==============================================================================
# PIPELINE: CI — Nightly
# ------------------------------------------------------------------------------
# Triggered by: Daily cron scheduled at 00:00 UTC, or manual trigger.
#
# Part of the Unified GitVersioned CI/CD Workflow:
#      [ ] 1. DEVELOPMENT (PR validation, preview docs)
#      [ ] 2. MAIN (Post-merge validation, main branch docs)
#   -> [x] 3. NIGHTLY (Daily check, pre-release publish, nightly docs) <--- CURRENT WORKFLOW
#      [ ] 4. WEEKLY (Weekly regression checks)
#      [ ] 5. RELEASE (Production PyPI & OCI publish, versioned docs, manual trigger option)
#      [ ] 6. UTILITY: CLEANUP (Daily stale docs/OCI image cleanup)
#      [ ] 7. UTILITY: PR COMMENTER (Coverage & builds reporting on PRs)
#
# High-Level Execution flow & Job Dependencies:
#
#   [Check Changes & Init] (Stage 0 Gate: init-gate)
#         │
#         ▼ (If changes detected)
#   ├──> [Quality Checks] ───────> [Quality Gate] ───┐
#   ├──> [Functional Tests] ─────> [Functional Gate] ├─> [Publish Python] ──> [Publish OCI]
#   ├──> [Integrity Checks] ──────> [Integrity Gate]  │                        └─> [Nightly Docs]
#   └──> [Build Jobs] ───────────> [Build Gate]       │
#                                     │              │
#                                     ▼              │
#                                [E2E Tests] ────────> [E2E Gate]
#
# ==============================================================================
name: "CI — Nightly"
on:
  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC daily
  workflow_dispatch:
permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  actions: read
  attestations: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:

  # ── Stage 0: Pipeline Initialization ───────────────────────────────────────
  init-gate:
    name: "Pipeline Initialization"
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      default_python: ${{ steps.parse.outputs.default_python }}
      quick_matrix: ${{ steps.parse.outputs.quick_matrix }}
      full_matrix: ${{ steps.parse.outputs.full_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            COMMITS=$(git log --since="25 hours ago" --oneline)
            if [ -z "$COMMITS" ]; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Parse config
        id: parse
        run: |
          echo "default_python=$(jq -r '.default_python' .github/pipeline-config.json)" >> "$GITHUB_OUTPUT"
          echo "quick_matrix=$(jq -c '.quick_matrix' .github/pipeline-config.json)" >> "$GITHUB_OUTPUT"
          echo "full_matrix=$(jq -c '.full_matrix' .github/pipeline-config.json)" >> "$GITHUB_OUTPUT"

  # ── Stage 1: Quality Checks ────────────────────────────────────────────────
  project-quality:
    name: "Project Quality"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Project Quality
        uses: ./.github/actions/project/quality
        with:
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  python-quality:
    name: "Python Quality (Py ${{ matrix.python-version }})"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.init-gate.outputs.full_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Python Quality
        uses: ./.github/actions/python/quality
        with:
          python-version: ${{ matrix.python-version }}
          force-run: "true"
  oci-quality:
    name: "OCI Quality"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run OCI Quality
        uses: ./.github/actions/oci/quality
        with:
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  quality-gate:
    name: "Quality Gate"
    needs:
      - init-gate
      - project-quality
      - python-quality
      - oci-quality
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Quality Gate Passed"

  # ── Stage 2: Functional Tests ──────────────────────────────────────────────
  project-functional-tests:
    name: "Project Functional Tests"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Project Functional Tests
        uses: ./.github/actions/project/tests
        with:
          test-type: "functional"
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  python-functional-tests:
    name: "Python Functional Tests (Py ${{ matrix.python-version }})"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.init-gate.outputs.full_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Python Functional Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          test-type: "functional"
          test-category: "all"
          force-run: "true"
      - name: Upload Python Functional Coverage Report
        if: steps.run-tests.outputs.coverage-reports != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-functional-${{ matrix.python-version }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 14
  functional-gate:
    name: "Functional Gate"
    needs:
      - init-gate
      - project-functional-tests
      - python-functional-tests
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Functional Gate Passed"

  # ── Stage 3: Integrity Checks ──────────────────────────────────────────────
  project-link-checks:
    name: "Project Link Checks"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Project Link Checks
        uses: ./.github/actions/project/tests
        with:
          test-type: "link-checks"
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  integrity-gate:
    name: "Integrity Gate"
    needs:
      - init-gate
      - project-link-checks
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Integrity Gate Passed"

  # ── Stage 4: Build ─────────────────────────────────────────────────────────
  python-build:
    name: "Python Build"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Python Build
        uses: ./.github/actions/python/build
        with:
          build-type: "nightly"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifact-nightly
          path: dist/
          retention-days: 7
  oci-build:
    name: "OCI Build"
    needs: init-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run OCI Build
        id: build
        uses: ./.github/actions/oci/build
        with:
          build-type: "nightly"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
      - name: Upload OCI Image Tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifact-oci-nightly
          path: ${{ steps.build.outputs.image-path }}
          retention-days: 7
  build-gate:
    name: "Build Gate"
    needs:
      - init-gate
      - python-build
      - oci-build
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Build Gate Passed"

  # ── Stage 5: E2E Tests ─────────────────────────────────────────────────────
  project-e2e-tests:
    name: "Project E2E Tests (Examples)"
    needs:
      - init-gate
      - build-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Project E2E Tests
        uses: ./.github/actions/project/tests
        with:
          test-type: "e2e"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
  python-e2e-tests:
    name: "Python E2E Tests (Py ${{ matrix.python-version }})"
    needs:
      - init-gate
      - build-gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.init-gate.outputs.full_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-nightly
          path: dist/
      - name: Run Python E2E Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          test-type: "e2e"
          test-category: "smoke or sanity"
          force-run: "true"
      - name: Upload Python E2E Coverage Report
        if: steps.run-tests.outputs.coverage-reports != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-e2e-${{ matrix.python-version }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 14
  oci-e2e-tests:
    name: "OCI E2E Tests (Structure)"
    needs:
      - init-gate
      - build-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Download OCI Image Tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-oci-nightly
      - name: Run OCI E2E Tests
        uses: ./.github/actions/oci/tests
        with:
          image-tar: "gitversioned-latest.tar"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
  e2e-gate:
    name: "E2E Gate"
    needs:
      - init-gate
      - project-e2e-tests
      - python-e2e-tests
      - oci-e2e-tests
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "E2E Gate Passed"

  # ── Stage 6: Publish & Deploy ──────────────────────────────────────────────
  publish-python:
    name: "Publish Nightly Python Packages"
    needs:
      - init-gate
      - quality-gate
      - functional-gate
      - e2e-gate
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Download All Built Wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-nightly
          path: dist/
      - name: Publish Python Package
        uses: ./.github/actions/python/publish
        with:
          create-release: "false"
  publish-oci:
    name: "Publish Nightly OCI Image"
    needs:
      - init-gate
      - publish-python
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Get commit info
        id: vars
        run: |
          echo "date=$(git log -1 --format=%cd --date=format:%Y%m%d)" >> "$GITHUB_OUTPUT"
      - name: Download OCI Image Tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-oci-nightly
      - name: Publish OCI Image
        uses: ./.github/actions/oci/publish
        with:
          image-tar: "gitversioned-latest.tar"
          image-tag: "nightly-${{ steps.vars.outputs.date }}"
          alias-tag: "nightly"
  docs:
    name: "Build & Deploy Docs"
    needs:
      - init-gate
      - publish-python
    if: needs.init-gate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Get commit info
        id: vars
        run: |
          echo "date=$(git log -1 --format=%cd --date=format:%Y%m%d)" >> "$GITHUB_OUTPUT"
      - name: Download Python test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: coverage-*-3.10
          path: coverage/python
          merge-multiple: true
        continue-on-error: true
      - name: Run Project Docs Builder
        uses: ./.github/actions/project/docs
        with:
          version-name: "nightly-${{ steps.vars.outputs.date }}"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
