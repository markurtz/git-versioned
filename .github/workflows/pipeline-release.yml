# ==============================================================================
# PIPELINE: CI — Release
# ------------------------------------------------------------------------------
# Triggered by:
#   1. Manual workflow dispatch via GitHub UI (with version tag input) on 'main'
#      or 'releases/*' branches. Runs validation checks, then tags the commit
#      and pushes it to origin.
#   2. Direct push of a semver tag (v*.*.*) or automated tag push from (1).
#      Runs validation checks and publishes release to PyPI & GitHub / OCI.
#
# Part of the Unified GitVersioned CI/CD Workflow:
#      [ ] 1. DEVELOPMENT (PR validation, preview docs)
#      [ ] 2. MAIN (Post-merge validation, main branch docs)
#      [ ] 3. NIGHTLY (Daily check, pre-release publish, nightly docs)
#      [ ] 4. WEEKLY (Weekly regression checks)
#   -> [x] 5. RELEASE (Production PyPI & OCI publish, versioned docs, manual trigger option) <--- CURRENT WORKFLOW
#      [ ] 6. UTILITY: CLEANUP (Daily stale docs/OCI image cleanup)
#      [ ] 7. UTILITY: PR COMMENTER (Coverage & builds reporting on PRs)
#
# High-Level Execution flow & Job Dependencies:
#
#   [Pipeline Init] (Stage 0 Gate: init-gate)
#         │
#         ├──> [Quality Checks] ───────> [Quality Gate] ─────────────────────────┐
#         ├──> [Functional Tests] ─────> [Functional Gate] ──────────────────────┼─> [Release Gate] (Approval)
#         ├──> [Integrity Checks] ──────> [Integrity Gate] ───────────────────────┤         │
#         └──> [Build Jobs] ───────────> [Build Gate] ───> [E2E Tests] ──> [E2E Gate]       ├──> [Tag Release]
#                                                                                           │         │
#                                                                                           ▼         ▼
#                                                                                     [Publish Python]
#                                                                                             │
#                                                                                             ├──> [Publish OCI]
#                                                                                             └──> [Versioned Docs]
#
# ==============================================================================
name: "CI — Release"
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"      # Strict semver: v1.2.3
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag (must match strict semver pattern vX.Y.Z)"
        required: true
        type: string
permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  attestations: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:

  # ── Stage 0: Pipeline Initialization ───────────────────────────────────────
  init-gate:
    name: "Pipeline Initialization"
    runs-on: ubuntu-latest
    environment: release
    outputs:
      has_changes: "true"
      default_python: ${{ steps.parse.outputs.default_python }}
      quick_matrix: ${{ steps.parse.outputs.quick_matrix }}
      full_matrix: ${{ steps.parse.outputs.full_matrix }}
    steps:
      - name: Validate Trigger and Branch/Tag Constraints
        shell: bash
        run: |
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          echo "Validating execution constraints..."
          echo "GitHub Ref: $REF"
          echo "Trigger Event: $EVENT"

          # 1. Version tag pattern check (e.g., refs/tags/v1.2.3)
          if [[ "$REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "SUCCESS: Valid version tag trigger."
            exit 0
          fi

          # 2. Branch trigger check (main or releases/*)
          if [[ "$REF" == "refs/heads/main" || "$REF" =~ ^refs/heads/releases/ ]]; then
            if [[ "$EVENT" == "workflow_dispatch" ]]; then
              echo "SUCCESS: Valid manual branch dispatch trigger."
              exit 0
            else
              echo "ERROR: Branch release pathways must be triggered via workflow_dispatch."
              exit 1
            fi
          fi
          echo "ERROR: Invalid release execution context."
          echo "Release pipelines can only run on version tags (vX.Y.Z) or via manual workflow_dispatch on 'main' or 'releases/*' branches."
          exit 1
      - name: Checkout config
        uses: ./.github/actions/utility/checkout
        with:
          sparse-checkout: .github/pipeline-config.json
          sparse-checkout-cone-mode: false
      - name: Parse config
        id: parse
        run: |
          echo "default_python=$(jq -r '.default_python' .github/pipeline-config.json)" >> "$GITHUB_OUTPUT"
          echo "quick_matrix=$(jq -c '.quick_matrix' .github/pipeline-config.json)" >> "$GITHUB_OUTPUT"
          echo "full_matrix=$(jq -c '.full_matrix' .github/pipeline-config.json)" >> "$GITHUB_OUTPUT"

  # ── Stage 1: Quality Checks ────────────────────────────────────────────────
  project-quality:
    name: "Project Quality"
    needs: init-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Project Quality
        uses: ./.github/actions/project/quality
        with:
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  python-quality:
    name: "Python Quality (Py ${{ matrix.python-version }})"
    needs: init-gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.init-gate.outputs.full_matrix) }}
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Python Quality
        uses: ./.github/actions/python/quality
        with:
          python-version: ${{ matrix.python-version }}
          force-run: "true"
  oci-quality:
    name: "OCI Quality"
    needs: init-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run OCI Quality
        uses: ./.github/actions/oci/quality
        with:
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  quality-gate:
    name: "Quality Gate"
    needs:
      - project-quality
      - python-quality
      - oci-quality
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Quality Gate Passed"

  # ── Stage 2: Functional Tests ──────────────────────────────────────────────
  project-functional-tests:
    name: "Project Functional Tests"
    needs: init-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Project Functional Tests
        uses: ./.github/actions/project/tests
        with:
          test-type: "functional"
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  python-functional-tests:
    name: "Python Functional Tests (Py ${{ matrix.python-version }})"
    needs: init-gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.init-gate.outputs.full_matrix) }}
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Python Functional Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          test-type: "functional"
          test-category: "regression"
          force-run: "true"
      - name: Upload Python Functional Coverage Report
        if: steps.run-tests.outputs.coverage-reports != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-functional-${{ matrix.python-version }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 90
  functional-gate:
    name: "Functional Gate"
    needs:
      - project-functional-tests
      - python-functional-tests
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Functional Gate Passed"

  # ── Stage 3: Integrity Checks ──────────────────────────────────────────────
  project-link-checks:
    name: "Project Link Checks"
    needs: init-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Project Link Checks
        uses: ./.github/actions/project/tests
        with:
          test-type: "link-checks"
          python-version: ${{ needs.init-gate.outputs.default_python }}
          force-run: "true"
  integrity-gate:
    name: "Integrity Gate"
    needs:
      - project-link-checks
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Integrity Gate Passed"

  # ── Stage 4: Build ─────────────────────────────────────────────────────────
  python-build:
    name: "Python Build"
    needs: init-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Python Build
        uses: ./.github/actions/python/build
        with:
          build-type: "release"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifact-release
          path: dist/
          retention-days: 7
  oci-build:
    name: "OCI Build"
    needs: init-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run OCI Build
        id: build
        uses: ./.github/actions/oci/build
        with:
          build-type: "release"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
      - name: Upload OCI Image Tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifact-oci-release
          path: ${{ steps.build.outputs.image-path }}
          retention-days: 7
  build-gate:
    name: "Build Gate"
    needs:
      - python-build
      - oci-build
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Build Gate Passed"

  # ── Stage 5: E2E Tests ─────────────────────────────────────────────────────
  project-e2e-tests:
    name: "Project E2E Tests (Examples)"
    needs:
      - init-gate
      - build-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Run Project E2E Tests
        uses: ./.github/actions/project/tests
        with:
          test-type: "e2e"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
  python-e2e-tests:
    name: "Python E2E Tests (Py ${{ matrix.python-version }})"
    needs:
      - init-gate
      - build-gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.init-gate.outputs.full_matrix) }}
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-release
          path: dist/
      - name: Run Python E2E Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          test-type: "e2e"
          test-category: "regression"
          force-run: "true"
      - name: Upload Python E2E Coverage Report
        if: steps.run-tests.outputs.coverage-reports != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-e2e-${{ matrix.python-version }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 90
  oci-e2e-tests:
    name: "OCI E2E Tests (Structure)"
    needs:
      - init-gate
      - build-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Download OCI Image Tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-oci-release
      - name: Run OCI E2E Tests
        uses: ./.github/actions/oci/tests
        with:
          image-tar: "gitversioned-latest.tar"
          force-run: "true"
          python-version: ${{ needs.init-gate.outputs.default_python }}
  e2e-gate:
    name: "E2E Gate"
    needs:
      - project-e2e-tests
      - python-e2e-tests
      - oci-e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "E2E Gate Passed"

  # ── Stage 6: Release Gate (Approval) ───────────────────────────────────────
  release-gate:
    name: "Release Approval Gate"
    needs:
      - init-gate
      - quality-gate
      - functional-gate
      - integrity-gate
      - e2e-gate
    runs-on: ubuntu-latest
    environment: release
    outputs:
      default_python: ${{ needs.init-gate.outputs.default_python }}
    steps:
      - name: Approve Release
        run: echo "Release approved and gating checks passed"

  # ── Stage 7: Tagging (only for workflow_dispatch on branches) ──────────────
  tag-release:
    name: "Tag and Push Release"
    needs:
      - release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      default_python: ${{ needs.release-gate.outputs.default_python }}
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Tag and Push Release Tag
        if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/utility/tag-release
        with:
          tag-name: ${{ github.event.inputs.version_tag }}

  # ── Stage 8: Publish & Deploy ──────────────────────────────────────────────
  publish-python:
    name: "Publish Python Release"
    needs:
      - tag-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      default_python: ${{ needs.tag-release.outputs.default_python }}
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Download All Built Wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-release
          path: dist/
      - name: Publish Python Package
        uses: ./.github/actions/python/publish
        with:
          create-release: "true"
          tag-name: ${{ github.event.inputs.version_tag || github.ref_name }}
  publish-oci:
    name: "Publish Release OCI Image"
    needs:
      - publish-python
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Download OCI Image Tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-artifact-oci-release
      - name: Publish OCI Image
        uses: ./.github/actions/oci/publish
        with:
          image-tar: "gitversioned-latest.tar"
          image-tag: ${{ github.event.inputs.version_tag || github.ref_name }}
          alias-tag: "latest"
  docs:
    name: "Versioned Docs"
    needs:
      - publish-python
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: ./.github/actions/utility/checkout
        with:
          version-tag: ${{ github.event.inputs.version_tag }}
      - name: Download Python test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: coverage-*-3.10
          path: coverage/python
          merge-multiple: true
        continue-on-error: true
      - name: Run Project Docs Builder
        uses: ./.github/actions/project/docs
        with:
          version-name: ${{ github.event.inputs.version_tag || github.ref_name }}
          force-run: "true"
          python-version: ${{ needs.publish-python.outputs.default_python }}
