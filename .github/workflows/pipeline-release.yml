name: "CI — Release"
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"      # Strict semver: v1.2.3
permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  attestations: write
jobs:
  # ── Stage 1: Quality Gate ──────────────────────────────────────────────────
  project-quality:
    name: "Project Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Project Quality
        uses: ./.github/actions/project/quality
        with:
          force-run: "true"
  python-quality:
    name: "Python Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Python Quality
        uses: ./.github/actions/python/quality
        with:
          python-version: "3.10"
          force-run: "true"
  oci-quality:
    name: "OCI Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run OCI Quality
        uses: ./.github/actions/oci/quality
        with:
          force-run: "true"

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  python-build:
    name: "Python Build (Py ${{ matrix.python-version }})"
    needs:
      - python-quality
      - project-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Python Build
        uses: ./.github/actions/python/build
        with:
          python-version: ${{ matrix.python-version }}
          force-run: "true"
      - name: Upload Build Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: build-artifact-release-py${{ matrix.python-version }}-${{ github.run_id }}
          path: dist/
          retention-days: 7
  oci-build:
    name: "OCI Build"
    needs:
      - oci-quality
      - project-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run OCI Build
        uses: ./.github/actions/oci/build
        with:
          save-image: "true"
          force-run: "true"
      - name: Upload OCI Image Tarball
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: build-artifact-oci-release-${{ github.run_id }}
          path: gitversioned-latest.tar
          retention-days: 7

  # ── Stage 3: Parallel Tests ────────────────────────────────────────────────
  project-functional-tests:
    name: "Project Functional Tests"
    needs:
      - project-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Project Functional Tests
        uses: ./.github/actions/project/tests
        with:
          run-functional: "true"
          run-e2e: "false"
          force-run: "true"
  project-e2e-tests:
    name: "Project E2E Tests (Links)"
    needs:
      - project-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Project E2E Tests
        uses: ./.github/actions/project/tests
        with:
          run-functional: "false"
          run-e2e: "true"
          force-run: "true"
  python-functional-tests:
    name: "Python Functional Tests (Py ${{ matrix.python-version }})"
    needs:
      - python-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Python Functional Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          run-functional: "true"
          run-e2e: "false"
          test-category: "regression"
          generate-coverage: "true"
          force-run: "true"
      - name: Upload Python Functional Coverage Report
        if: steps.run-tests.outputs.coverage-generated == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-report-functional-python-py${{ matrix.python-version }}-${{ github.run_id
            }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 90
  python-e2e-tests:
    name: "Python E2E Tests (Py ${{ matrix.python-version }})"
    needs:
      - python-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Download Build Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec801d16  # v4.1.8
        with:
          name: build-artifact-release-py${{ matrix.python-version }}-${{ github.run_id }}
          path: dist/
      - name: Run Python E2E Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          run-functional: "false"
          run-e2e: "true"
          test-category: "regression"
          generate-coverage: "true"
          force-run: "true"
      - name: Upload Python E2E Coverage Report
        if: steps.run-tests.outputs.coverage-generated == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-report-e2e-python-py${{ matrix.python-version }}-${{ github.run_id
            }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 90
  oci-functional-tests:
    name: "OCI Functional Tests"
    needs:
      - oci-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run OCI Functional Tests
        uses: ./.github/actions/oci/tests
        with:
          run-functional: "true"
          run-e2e: "false"
          force-run: "true"
  oci-e2e-tests:
    name: "OCI E2E Tests (Structure)"
    needs:
      - oci-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Download OCI Image Tarball
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec801d16  # v4.1.8
        with:
          name: build-artifact-oci-release-${{ github.run_id }}
      - name: Run OCI E2E Tests
        uses: ./.github/actions/oci/tests
        with:
          run-functional: "false"
          run-e2e: "true"
          force-run: "true"

  # ── Stage 4: Versioned Docs ────────────────────────────────────────────────
  docs:
    name: "Versioned Docs"
    needs:
      - python-functional-tests
      - python-e2e-tests
      - project-functional-tests
      - project-e2e-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Project Docs Builder
        uses: ./.github/actions/project/docs
        with:
          build-type: "release"
          alias: "latest"
          include-coverage: "true"
          deploy: "true"
          force-run: "true"

  # ── Stage 5: Publish Artifacts ─────────────────────────────────────────────
  publish-python:
    name: "Publish Python Release"
    needs:
      - python-functional-tests
      - python-e2e-tests
      - project-e2e-tests
      - oci-e2e-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Download All Built Wheels
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec801d16  # v4.1.8
        with:
          pattern: build-artifact-release-py*
          path: dist/
          merge-multiple: true
      - name: Publish Python Package
        uses: ./.github/actions/python/publish
        with:
          artifact-name: ""  # Not needed since we downloaded all wheels directly to dist/
          create-release: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
  publish-oci:
    name: "Publish Release OCI Image"
    needs:
      - oci-e2e-tests
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Download OCI Image Tarball
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec801d16  # v4.1.8
        with:
          name: build-artifact-oci-release-${{ github.run_id }}
      - name: Publish OCI Image
        uses: ./.github/actions/oci/publish
        with:
          image-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          load-image: "true"
