name: "CI — Development"
on:
  pull_request:
    branches:
      - main
concurrency:
  group: "dev-${{ github.head_ref }}"
  cancel-in-progress: true
permissions:
  contents: write
  security-events: write
  pull-requests: write
jobs:
  # ── Detect Changes ─────────────────────────────────────────────────────────
  changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Check for docs changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        id: filter
        with:
          filters: .github/paths-filter.yml

  # ── Stage 1: Quality Gate ──────────────────────────────────────────────────
  project-quality:
    name: "Project Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Project Quality
        uses: ./.github/actions/project/quality
  python-quality:
    name: "Python Quality (Py ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Python Quality
        uses: ./.github/actions/python/quality
        with:
          python-version: ${{ matrix.python-version }}
  oci-quality:
    name: "OCI Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run OCI Quality
        uses: ./.github/actions/oci/quality

  # ── Stage 3: Build ─────────────────────────────────────────────────────────
  python-build:
    name: "Python Build (Py ${{ matrix.python-version }})"
    needs:
      - python-quality
      - project-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Python Build
        uses: ./.github/actions/python/build
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: build-artifact-dev-py${{ matrix.python-version }}-${{ github.run_id }}
          path: dist/
          retention-days: 7
      - name: Create Build Comment Metadata
        run: |
          mkdir -p dist
          echo "📦 **Package Build (Python ${{ matrix.python-version }})**: Wheels and source distributions built successfully." > dist/build-comment.txt
          echo "The build artifacts can be downloaded from the [Workflow Run Artifacts Page](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." >> dist/build-comment.txt
      - name: Upload Build Comment Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: pr-comment-build-py${{ matrix.python-version }}-${{ github.run_id }}
          path: dist/build-comment.txt
          retention-days: 7

  # ── Stage 4: Parallel Tests ────────────────────────────────────────────────
  project-functional-tests:
    name: "Project Functional Tests"
    needs:
      - project-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Project Functional Tests
        uses: ./.github/actions/project/tests
        with:
          run-functional: "true"
          run-e2e: "false"
  project-e2e-tests:
    name: "Project E2E Tests (Links)"
    needs:
      - project-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Project E2E Tests
        uses: ./.github/actions/project/tests
        with:
          run-functional: "false"
          run-e2e: "true"
  python-functional-tests:
    name: "Python Functional Tests (Py ${{ matrix.python-version }})"
    needs:
      - python-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Python Functional Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          run-functional: "true"
          run-e2e: "false"
          test-category: "smoke"
          generate-coverage: "true"
      - name: Upload Python Functional Coverage Report
        if: steps.run-tests.outputs.coverage-generated == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-report-functional-python-py${{ matrix.python-version }}-${{ github.run_id
            }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 7
  python-e2e-tests:
    name: "Python E2E Tests (Py ${{ matrix.python-version }})"
    needs:
      - python-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Download Build Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372ec801d16  # v4.1.8
        with:
          name: build-artifact-dev-py${{ matrix.python-version }}-${{ github.run_id }}
          path: dist/
      - name: Run Python E2E Tests
        id: run-tests
        uses: ./.github/actions/python/tests
        with:
          python-version: ${{ matrix.python-version }}
          run-functional: "false"
          run-e2e: "true"
          test-category: "smoke"
          generate-coverage: "true"
      - name: Upload Python E2E Coverage Report
        if: steps.run-tests.outputs.coverage-generated == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-report-e2e-python-py${{ matrix.python-version }}-${{ github.run_id
            }}
          path: ${{ steps.run-tests.outputs.coverage-reports }}
          retention-days: 7

  # ── Stage 5: Docs (Conditional) ────────────────────────────────────────────
  docs:
    name: "Build & Deploy Docs"
    needs:
      - changes
      - python-functional-tests
      - python-e2e-tests
      - project-functional-tests
      - project-e2e-tests
    if: needs.changes.outputs.docs == 'true' && github.event.pull_request.head.repo.fork ==
      false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Project Docs Builder
        uses: ./.github/actions/project/docs
        with:
          build-type: "dev-branch"
          alias: "pr-${{ github.event.pull_request.number }}"
          include-coverage: "true"
          deploy: "true"
      - name: Create Docs Comment Metadata
        run: |
          mkdir -p site
          echo "📖 **Documentation Preview**: Staging documentation has been successfully built and deployed." > site/docs-comment.txt
          echo "You can view the preview here: [PR Staging Documentation](https://markurtz.github.io/gitversioned/pr-${{ github.event.pull_request.number }}/)" >> site/docs-comment.txt
      - name: Upload Docs Comment Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: pr-comment-docs-${{ github.run_id }}
          path: site/docs-comment.txt
          retention-days: 7
