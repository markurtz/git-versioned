name: "PR Commenter"
on:
  workflow_run:
    workflows:
      - "CI — Development"
    types:
      - completed
permissions:
  pull-requests: write
  actions: read
jobs:
  post_comment:
    name: "Post PR Status Comment"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve PR & SHA
        id: context
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ github.token }}
          script: |
            const run = context.payload.workflow_run;
            const pr = (run.pull_requests[0] || (await github.rest.search.issuesAndPullRequests({
              q: `is:pr repo:${context.repo.owner}/${context.repo.repo} sha:${run.head_sha}`
            })).data.items[0])?.number;
            if (!pr) core.setFailed("No PR found");
            core.setOutput("number", pr);
            core.setOutput("sha_short", run.head_sha.substring(0, 7));
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
        continue-on-error: true
      - name: Compile Coverage Report
        id: coverage
        run: |
          python3 -c '
          import os, pathlib
          workspace = pathlib.Path(".")
          summary_rows = []
          details = []
          for fp in workspace.rglob("coverage-*.md"):
              content = fp.read_text()
              py_ver = fp.name.split("-")[2] if len(fp.name.split("-")) > 2 else "Python"
              suite = next((s for s in ["func", "unit", "int", "e2e"] if s in fp.name), "Unknown")
              total_line = next((l for l in content.splitlines() if "TOTAL" in l.upper()), None)
              if total_line:
                  cells = [c.strip() for c in total_line.replace("*", "").split("|") if c.strip()]
                  summary_rows.append(f"| 🐍 {suite.capitalize()} | {py_ver} | {cells[1]} | {cells[2]} | **{cells[3]}** |")
              details.append(f"<details>\n<summary>🔍 {suite.capitalize()} Suite ({py_ver})</summary>\n\n{content}\n</details>")
          if summary_rows:
              body = "### 📊 Test Coverage Results\n\n| Test Suite | Python | Stmts | Miss | Coverage |\n| :--- | :---: | :---: | :---: | :---: |\n" + "\n".join(sorted(summary_rows)) + "\n\n<hr />\n\n### 📄 Detailed Reports\n\n" + "\n".join(details)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write(f"coverage_body={body}\n")
          '
      - name: Compile Build Report
        id: builds
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const artifacts = (await github.rest.actions.listWorkflowRunArtifacts({ ...context.repo, run_id: ${{ github.event.workflow_run.id }} })).data.artifacts;
            const target = artifacts.filter(a => a.name.startsWith('build-artifact-'));
            if (target.length > 0) {
              let body = `### 📦 Build Artifacts\n\nFor commit \`${{ steps.context.outputs.sha_short }}\`:\n`;
              target.forEach(a => {
                body += `- 📦 [${a.name}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}/artifacts/${a.id})\n`;
              });
              core.setOutput("body", body);
            }
      - name: Compile Docs Preview
        id: docs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const jobs = (await github.rest.actions.listJobsForWorkflowRun({ ...context.repo, run_id: ${{ github.event.workflow_run.id }} })).data.jobs;
            if (jobs.find(j => j.name === "Build & Deploy Docs" && j.conclusion === "success")) {
              const url = `https://${context.repo.owner.toLowerCase()}.github.io/${context.repo.repo}/review/pr-${{ steps.context.outputs.number }}/`;
              core.setOutput("body", `### 📖 Documentation\n\n🔗 [PR Documentation Preview](${url})`);
            }
      - name: Upsert Coverage Comment
        if: steps.coverage.outputs.coverage_body
        uses: ./.github/actions/utility/comment-upsert
        with:
          pr-number: ${{ steps.context.outputs.number }}
          marker: "<!-- gitversioned-coverage-comment -->"
          body: ${{ steps.coverage.outputs.coverage_body }}
      - name: Upsert Build Comment
        if: steps.builds.outputs.body
        uses: ./.github/actions/utility/comment-upsert
        with:
          pr-number: ${{ steps.context.outputs.number }}
          marker: "<!-- gitversioned-build-comment -->"
          body: ${{ steps.builds.outputs.body }}
      - name: Upsert Docs Comment
        if: steps.docs.outputs.body
        uses: ./.github/actions/utility/comment-upsert
        with:
          pr-number: ${{ steps.context.outputs.number }}
          marker: "<!-- gitversioned-docs-comment -->"
          body: ${{ steps.docs.outputs.body }}
