---
# ─────────────────────────────────────────────────────────────────────────────
# _publish.yml — Reusable Artifact Publisher
#
# Handles publishing built artifacts or containers to an artifact repository
# or container registry.
#
# Inputs:
#   build_location — Directory path containing the built artifacts (if package)
#   build_type     — The type of build (e.g., nightly, release)
#
# Callers: nightly.yml, release.yml
# ─────────────────────────────────────────────────────────────────────────────
name: "Publish Artifacts (Reusable)"
on:
  workflow_call:
    inputs:
      build_location:
        description: "Directory path containing the built artifacts"
        required: false
        type: string
        default: ""
      build_type:
        description: "The type of build (e.g., nightly, release)"
        required: true
        type: string
    secrets:
      pypi_token:
        description: "PyPI API Token for publishing"
        required: false
permissions:
  contents: read
  id-token: write  # For PyPI OIDC trusted publishing
  packages: write  # To publish to GitHub Container Registry or GitHub Packages
jobs:
  publish:
    name: "Publish (${{ inputs.build_type }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Download build artifact
        if: ${{ inputs.build_location != '' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4
        with:
          name: build-artifact-${{ inputs.build_type }}-${{ github.run_id }}
          path: ${{ inputs.build_location }}
      - name: Publish to PyPI
        if: ${{ inputs.build_location != '' }}
        uses: pypa/gh-action-pypi-publish@81e9d935c883d0b210363ab89cf05f3894778450  # v1.8.14
        with:
          packages-dir: ${{ inputs.build_location }}
          password: ${{ secrets.pypi_token }}
