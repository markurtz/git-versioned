---
# ─────────────────────────────────────────────────────────────────────────────
# _publish.yml — Reusable Artifact Publisher
#
# Handles publishing built artifacts or containers to an artifact repository
# or container registry.
#
# Inputs:
#   build_location — Directory path containing the built artifacts (if package)
#   build_type     — The type of build (e.g., nightly, release)
#
# Callers: nightly.yml, release.yml
# ─────────────────────────────────────────────────────────────────────────────
name: "Publish Artifacts (Reusable)"
on:
  workflow_call:
    inputs:
      build_location:
        description: "Directory path containing the built artifacts"
        required: false
        type: string
        default: ""
      build_type:
        description: "The type of build (e.g., nightly, release)"
        required: true
        type: string
permissions:
  contents: write  # For GitHub Releases
  id-token: write  # For PyPI OIDC trusted publishing
  packages: write  # To publish to GitHub Container Registry or GitHub Packages
  attestations: write  # For artifact attestations
jobs:
  publish:
    name: "Publish (${{ inputs.build_type }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Download build artifact
        if: ${{ inputs.build_location != '' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4
        with:
          name: build-artifact-${{ inputs.build_type }}-${{ github.run_id }}
          path: ${{ inputs.build_location }}
      - name: Generate artifact attestations
        if: ${{ inputs.build_location != '' }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v1.5.1
        with:
          subject-path: ${{ inputs.build_location }}/*
      - name: Publish to PyPI
        if: ${{ inputs.build_location != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14
        with:
          packages-dir: ${{ inputs.build_location }}
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.0.8
        with:
          files: ${{ inputs.build_location }}/*
          generate_release_notes: true
          prerelease: ${{ inputs.build_type != 'release' }}
