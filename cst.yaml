schemaVersion: "2.0.0"
metadataTest:
  entrypoint: []
  cmd:
    - "python"
    - "-m"
    - "gitversioned"
  workdir: "/app"
  exposedPorts:
    - "8080"
  user: "appuser"
fileExistenceTests:
  - name: "Verify app directory exists"
    path: "/app"
    shouldExist: true
commandTests:
  - name: "Verify python is installed and functional"
    command: "python"
    args:
      - "--version"
    expectedOutput:
      - "Python 3.*"
  - name: "Verify gitversioned module execution and version check"
    command: "python"
    args:
      - "-m"
      - "gitversioned"
      - "--version"
    expectedOutput:
      - "gitversioned v.*"
