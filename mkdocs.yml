---
site_name: "GitVersioned"
site_description: "Opinionated PEP 440 Python versioning for Git repos and submodules. Enforces\
  \ CI/User authority and generates rich version.py files with deep metadata for auditability.\
  \ Native Hatch & Setuptools support. Simple, predictable, and foolproof automation."
site_author: "Mark Kurtz"
site_url: "https://markurtz.github.io/git-versioned/"
repo_url: "https://github.com/markurtz/git-versioned"
repo_name: "markurtz/git-versioned"
edit_uri: edit/main/docs/
# ---------------------------------------------------------------------------
# Variables
# All {{ variable }} references across the docs site are driven from here.
# ---------------------------------------------------------------------------
extra:
  gitversioned: "gitversioned"
  project_description: "Opinionated PEP 440 Python versioning for Git repos and submodules.\
    \ Enforces CI/User authority and generates rich version.py files with deep metadata for\
    \ auditability. Native Hatch & Setuptools support. Simple, predictable, and foolproof\
    \ automation."
  org_name: "markurtz"
  org_email: "conduct@markurtz.com"
  docs_url: "https://markurtz.github.io/git-versioned"
  min_python: "3.10"
  current_major_version: "0"
  slack_url: "https://slack.markurtz.org"
  blog_url: "https://blog.markurtz.org"
  roadmap_url: "https://github.com/markurtz/git-versioned/milestones"
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - "."
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
plugins:
  - macros
  - mike
  - minify:
      minify_html: true
  - mkdocs-nav-weight
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: sphinx
  - search
  - section-index
  - social
  - tags
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - scripts/extra.js
# ---------------------------------------------------------------------------
# LLM & AI Tooling
# ---------------------------------------------------------------------------
# llms.txt (root-level file) is served at /llms.txt on the deployed docs site.
# It follows the llmstxt.org specification and provides a curated, machine-
# readable index of documentation for LLM consumers and AI coding agents.
# A companion file, llms-full.txt, contains the concatenated documentation.
# The root AGENTS.md contains agent-specific coding instructions; it is also
# surfaced in the docs nav under Community > AI Agent Guide.
# ---------------------------------------------------------------------------
